# .gitleaks.toml — YOUR project allowlists
# This file is yours. update.sh never touches it.
#
# Core Drupal rules (vendor, contrib, DDEV, hash_salt, etc.) live in
# .gitleaks.core.toml — updated automatically via update.sh.

title = "Gitleaks — project config"

[extend]
path = ".gitleaks.core.toml"

# ─── Add your project-specific allowlists below ───────────────────────────────
# Example:
#
# [[allowlists]]
# description = "Fake API keys in test fixtures"
# paths = [
#   '''tests/.*''',
# ]
#
# [[allowlists]]
# description = "Legacy module with hardcoded values — tracked issue #123"
# paths = [
#   '''web/modules/custom/legacy_module/.*''',
# ]

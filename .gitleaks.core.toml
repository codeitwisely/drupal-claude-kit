# .gitleaks.core.toml — drupal-claude-kit core rules
# Managed by drupal-claude-kit. Do NOT edit this file.
# Run update.sh to get the latest version.
#
# To add project-specific allowlists, edit .gitleaks.toml instead.

title = "Gitleaks — Drupal core rules"

[extend]
useDefault = true

# ─── Universal Drupal paths ───────────────────────────────────────────────────

[[allowlists]]
description = "DDEV local environment — covered by .gitignore"
paths = [
  '''\.ddev/.*''',
]

[[allowlists]]
description = "Composer vendor — never committed"
paths = [
  '''vendor/.*''',
]

[[allowlists]]
description = "Drupal core — never committed"
paths = [
  '''web/core/.*''',
]

[[allowlists]]
description = "Key module config files — excluded via .gitignore"
paths = [
  '''config/sync/key\.key\..*\.yml''',
]

[[allowlists]]
description = "Drupal hash salt in settings files — local dev only"
regexes = [
  '''hash_salt.*=.*['\"][\w]{75,}['\"]''',
]

[[allowlists]]
description = "Contrib module minified JS — false positives from variable names"
paths = [
  '''web/modules/contrib/.*\.js$''',
  '''web/modules/contrib/.*\.min\.js$''',
  '''web/themes/contrib/.*\.js$''',
  '''web/libraries/.*\.js$''',
]

[[allowlists]]
description = "Test fixtures and example files"
paths = [
  '''.*\.test\.php$''',
  '''.*[Ff]ixtures?/.*''',
  '''.*[Ee]xample.*''',
]

[[allowlists]]
description = "Sanitized SQL exports (already anonymized)"
paths = [
  '''.*\.sanitized\.sql$''',
  '''.*\.sanitized\.sql\.gz$''',
]
